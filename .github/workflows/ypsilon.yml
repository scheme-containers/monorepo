name: docker-ypsilon-push-action

on:
  push:
    paths:
      - implementations/ypsilon/**/Dockerfile*
      - .github/workflows/ypsilon*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/ypsilon latest
        run: make VERSION=latest SCHEME=ypsilon build
      - name: Push schemers/ypsilon latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=ypsilon push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/ypsilon head
        run: make VERSION=head SCHEME=ypsilon build
      - name: Push schemers/ypsilon head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=ypsilon push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/ypsilon latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=ypsilon build
      - name: Push schemers/ypsilon latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=ypsilon push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/ypsilon head alpine
        run: make LINUX=alpine VERSION=head SCHEME=ypsilon build
      - name: Push schemers/ypsilon head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=ypsilon push
