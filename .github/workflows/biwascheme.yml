name: docker-biwascheme-push-action

on:
  push:
    paths:
      - implementations/biwascheme/**/Dockerfile*
      - .github/workflows/biwascheme*.yml
  schedule: 
    - cron: "17 4 * * 2"
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/biwascheme latest
        run: make VERSION=latest SCHEME=biwascheme build
      - name: Push schemers/biwascheme latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=biwascheme push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/biwascheme head
        run: make VERSION=head SCHEME=biwascheme build
      - name: Push schemers/biwascheme head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=biwascheme push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/biwascheme latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=biwascheme build
      - name: Push schemers/biwascheme latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=biwascheme push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/biwascheme head alpine
        run: make LINUX=alpine VERSION=head SCHEME=biwascheme build
      - name: Push schemers/biwascheme head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=biwascheme push
