name: docker-picrin-push-action

on:
  push:
    paths:
      - implementations/picrin/**/Dockerfile*
      - .github/workflows/picrin*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/picrin latest
        run: make VERSION=latest SCHEME=picrin build
      - name: Push schemers/picrin latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=picrin push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/picrin head
        run: make VERSION=head SCHEME=picrin build
      - name: Push schemers/picrin head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=picrin push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/picrin latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=picrin build
      - name: Push schemers/picrin latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=picrin push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/picrin head alpine
        run: make LINUX=alpine VERSION=head SCHEME=picrin build
      - name: Push schemers/picrin head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=picrin push
