name: docker-unsyntax-push-action

on:
  push:
    paths:
      - implementations/unsyntax/**/Dockerfile*
      - .github/workflows/unsyntax*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/unsyntax latest
        run: make VERSION=latest SCHEME=unsyntax build
      - name: Push schemers/unsyntax latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=unsyntax push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/unsyntax head
        run: make VERSION=head SCHEME=unsyntax build
      - name: Push schemers/unsyntax head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=unsyntax push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/unsyntax latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=unsyntax build
      - name: Push schemers/unsyntax latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=unsyntax push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/unsyntax head alpine
        run: make LINUX=alpine VERSION=head SCHEME=unsyntax build
      - name: Push schemers/unsyntax head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=unsyntax push
