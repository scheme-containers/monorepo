name: docker-kawa-push-action

on:
  push:
    paths:
      - implementations/kawa/**/Dockerfile*
      - .github/workflows/kawa*.yml
  schedule: 
    - cron: "17 4 * * 2"
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/kawa latest
        run: make VERSION=latest SCHEME=kawa build
      - name: Push schemers/kawa latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=kawa push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/kawa head
        run: make VERSION=head SCHEME=kawa build
      - name: Push schemers/kawa head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=kawa push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/kawa latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=kawa build
      - name: Push schemers/kawa latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=kawa push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/kawa head alpine
        run: make LINUX=alpine VERSION=head SCHEME=kawa build
      - name: Push schemers/kawa head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=kawa push
