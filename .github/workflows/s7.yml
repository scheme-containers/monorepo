name: docker-s7-push-action

on:
  push:
    paths:
      - implementations/s7/**/Dockerfile*
      - .github/workflows/s7*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/s7 latest
        run: make VERSION=latest SCHEME=s7 build
      - name: Push schemers/s7 latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=s7 push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/s7 head
        run: make VERSION=head SCHEME=s7 build
      - name: Push schemers/s7 head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=s7 push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/s7 latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=s7 build
      - name: Push schemers/s7 latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=s7 push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/s7 head alpine
        run: make LINUX=alpine VERSION=head SCHEME=s7 build
      - name: Push schemers/s7 head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=s7 push
