name: gauche

on:
  push:
    paths:
      - implementations/gauche/**/Dockerfile*
      - .github/workflows/gauche*.yml
  schedule: 
    - cron: "17 4 * * 2"
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/gauche latest
        run: make VERSION=latest SCHEME=gauche build
      - name: Push schemers/gauche latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=gauche push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/gauche head
        run: make VERSION=head SCHEME=gauche build
      - name: Push schemers/gauche head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=gauche push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/gauche latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=gauche build
      - name: Push schemers/gauche latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=gauche push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/gauche head alpine
        run: make LINUX=alpine VERSION=head SCHEME=gauche build
      - name: Push schemers/gauche head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=gauche push
