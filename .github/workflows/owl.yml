name: docker-owl-push-action

on:
  push:
    paths:
      - implementations/owl/**/Dockerfile*
      - .github/workflows/owl*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/owl latest
        run: make VERSION=latest SCHEME=owl build
      - name: Push schemers/owl latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=owl push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/owl head
        run: make VERSION=head SCHEME=owl build
      - name: Push schemers/owl head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=owl push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/owl latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=owl build
      - name: Push schemers/owl latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=owl push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/owl head alpine
        run: make LINUX=alpine VERSION=head SCHEME=owl build
      - name: Push schemers/owl head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=owl push
