
name: docker-umb-push-action

on:
  push:
    branches:
      - 'master'
    paths:
      - implementations/umb/**/Dockerfile

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      -
        name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push schemers/umb latest
        run: make VERSION=latest SCHEME=umb build push
      -
        name: Build and push schemers/umb head
        run: make VERSION=head SCHEME=umb build push
