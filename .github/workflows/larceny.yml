name: docker-larceny-push-action

on:
  push:
    paths:
      - implementations/larceny/**/Dockerfile*
      - .github/workflows/larceny*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/larceny latest
        run: make VERSION=latest SCHEME=larceny build
      - name: Push schemers/larceny latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=larceny push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/larceny head
        run: make VERSION=head SCHEME=larceny build
      - name: Push schemers/larceny head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=larceny push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/larceny latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=larceny build
      - name: Push schemers/larceny latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=larceny push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/larceny head alpine
        run: make LINUX=alpine VERSION=head SCHEME=larceny build
      - name: Push schemers/larceny head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=larceny push
