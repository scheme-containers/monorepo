name: docker-schluessel-push-action

on:
  push:
    paths:
      - implementations/schluessel/**/Dockerfile*
      - .github/workflows/schluessel*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/schluessel latest
        run: make VERSION=latest SCHEME=schluessel build
      - name: Push schemers/schluessel latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=schluessel push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/schluessel head
        run: make VERSION=head SCHEME=schluessel build
      - name: Push schemers/schluessel head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=schluessel push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/schluessel latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=schluessel build
      - name: Push schemers/schluessel latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=schluessel push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/schluessel head alpine
        run: make LINUX=alpine VERSION=head SCHEME=schluessel build
      - name: Push schemers/schluessel head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=schluessel push
