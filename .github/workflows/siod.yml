name: docker-siod-push-action

on:
  push:
    paths:
      - implementations/siod/**/Dockerfile*
      - .github/workflows/siod*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/siod latest
        run: make VERSION=latest SCHEME=siod build
      - name: Push schemers/siod latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=siod push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/siod head
        run: make VERSION=head SCHEME=siod build
      - name: Push schemers/siod head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=siod push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/siod latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=siod build
      - name: Push schemers/siod latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=siod push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/siod head alpine
        run: make LINUX=alpine VERSION=head SCHEME=siod build
      - name: Push schemers/siod head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=siod push
