name: docker-oaklisp-push-action

on:
  push:
    paths:
      - implementations/oaklisp/**/Dockerfile*
      - .github/workflows/oaklisp*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/oaklisp latest
        run: make VERSION=latest SCHEME=oaklisp build
      - name: Push schemers/oaklisp latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=oaklisp push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/oaklisp head
        run: make VERSION=head SCHEME=oaklisp build
      - name: Push schemers/oaklisp head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=oaklisp push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/oaklisp latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=oaklisp build
      - name: Push schemers/oaklisp latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=oaklisp push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/oaklisp head alpine
        run: make LINUX=alpine VERSION=head SCHEME=oaklisp build
      - name: Push schemers/oaklisp head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=oaklisp push
