name: docker-sisc-push-action

on:
  push:
    paths:
      - implementations/sisc/**/Dockerfile*
      - .github/workflows/sisc*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sisc latest
        run: make VERSION=latest SCHEME=sisc build
      - name: Push schemers/sisc latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=sisc push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sisc head
        run: make VERSION=head SCHEME=sisc build
      - name: Push schemers/sisc head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=sisc push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sisc latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=sisc build
      - name: Push schemers/sisc latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=sisc push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sisc head alpine
        run: make LINUX=alpine VERSION=head SCHEME=sisc build
      - name: Push schemers/sisc head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=sisc push
