name: docker-ksi-push-action

on:
  push:
    paths:
      - implementations/ksi/**/Dockerfile*
      - .github/workflows/ksi*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/ksi latest
        run: make VERSION=latest SCHEME=ksi build
      - name: Push schemers/ksi latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=ksi push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/ksi head
        run: make VERSION=head SCHEME=ksi build
      - name: Push schemers/ksi head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=ksi push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/ksi latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=ksi build
      - name: Push schemers/ksi latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=ksi push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/ksi head alpine
        run: make LINUX=alpine VERSION=head SCHEME=ksi build
      - name: Push schemers/ksi head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=ksi push
