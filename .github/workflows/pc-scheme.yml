name: docker-pc-scheme-push-action

on:
  push:
    paths:
      - implementations/pc-scheme/**/Dockerfile*
      - .github/workflows/pc-scheme*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/pc-scheme latest
        run: make VERSION=latest SCHEME=pc-scheme build
      - name: Push schemers/pc-scheme latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=pc-scheme push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/pc-scheme head
        run: make VERSION=head SCHEME=pc-scheme build
      - name: Push schemers/pc-scheme head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=pc-scheme push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/pc-scheme latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=pc-scheme build
      - name: Push schemers/pc-scheme latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=pc-scheme push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/pc-scheme head alpine
        run: make LINUX=alpine VERSION=head SCHEME=pc-scheme build
      - name: Push schemers/pc-scheme head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=pc-scheme push
