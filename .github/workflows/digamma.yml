name: docker-digamma-push-action

on:
  push:
    paths:
      - implementations/digamma/**/Dockerfile*
      - .github/workflows/digamma*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/digamma latest
        run: make VERSION=latest SCHEME=digamma build
      - name: Push schemers/digamma latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=digamma push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/digamma head
        run: make VERSION=head SCHEME=digamma build
      - name: Push schemers/digamma head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=digamma push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/digamma latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=digamma build
      - name: Push schemers/digamma latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=digamma push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/digamma head alpine
        run: make LINUX=alpine VERSION=head SCHEME=digamma build
      - name: Push schemers/digamma head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=digamma push
