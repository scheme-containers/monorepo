name: docker-scheme48-push-action

on:
  push:
    paths:
      - implementations/scheme48/**/Dockerfile*
      - .github/workflows/scheme48*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/scheme48 latest
        run: make VERSION=latest SCHEME=scheme48 build
      - name: Push schemers/scheme48 latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=scheme48 push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/scheme48 head
        run: make VERSION=head SCHEME=scheme48 build
      - name: Push schemers/scheme48 head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=scheme48 push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/scheme48 latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=scheme48 build
      - name: Push schemers/scheme48 latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=scheme48 push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/scheme48 head alpine
        run: make LINUX=alpine VERSION=head SCHEME=scheme48 build
      - name: Push schemers/scheme48 head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=scheme48 push
