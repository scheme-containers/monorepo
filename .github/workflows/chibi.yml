name: docker-chibi-push-action

on:
  push:
    paths:
      - implementations/chibi/**/Dockerfile*
      - .github/workflows/chibi*.yml
  schedule: 
    - cron: "17 4 * * 2"
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/chibi latest
        run: make VERSION=latest SCHEME=chibi build
      - name: Push schemers/chibi latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=chibi push
      - name: Build schemers/chibi latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=chibi build
      - name: Push schemers/chibi latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=chibi push
      - name: Build schemers/chibi head
        run: make VERSION=head SCHEME=chibi build
      - name: Push schemers/chibi head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=chibi push
      - name: Push schemers/chibi head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=chibi push
