
name: docker-chibi-push-action

on:
  push:
    branches:
      - 'master'
    paths:
      - implementations/chibi/**/Dockerfile
  schedule:
    - cron: "17 4 * * 2"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      -
        name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push schemers/chibi latest
        run: make VERSION=latest SCHEME=chibi build push
      -
        name: Build and push schemers/chibi head
        run: make VERSION=head latest SCHEME=chibi build push
