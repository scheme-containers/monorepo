name: docker-umb-push-action

on:
  push:
    paths:
      - implementations/umb/**/Dockerfile*
      - .github/workflows/umb*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/umb latest
        run: make VERSION=latest SCHEME=umb build
      - name: Push schemers/umb latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=umb push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/umb head
        run: make VERSION=head SCHEME=umb build
      - name: Push schemers/umb head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=umb push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/umb latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=umb build
      - name: Push schemers/umb latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=umb push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/umb head alpine
        run: make LINUX=alpine VERSION=head SCHEME=umb build
      - name: Push schemers/umb head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=umb push
