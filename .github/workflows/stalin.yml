name: stalin

on:
  push:
    paths:
      - implementations/stalin/**/Dockerfile*
      - .github/workflows/stalin*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/stalin latest
        run: make VERSION=latest SCHEME=stalin build
      - name: Push schemers/stalin latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=stalin push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/stalin head
        run: make VERSION=head SCHEME=stalin build
      - name: Push schemers/stalin head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=stalin push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/stalin latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=stalin build
      - name: Push schemers/stalin latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=stalin push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/stalin head alpine
        run: make LINUX=alpine VERSION=head SCHEME=stalin build
      - name: Push schemers/stalin head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=stalin push
