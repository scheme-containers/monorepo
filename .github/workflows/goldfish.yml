name: docker-goldfish-push-action

on:
  push:
    paths:
      - implementations/goldfish/**/Dockerfile*
      - .github/workflows/goldfish*.yml
  schedule: 
    - cron: "17 4 * * 2"
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/goldfish latest
        run: make VERSION=latest SCHEME=goldfish build
      - name: Push schemers/goldfish latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=goldfish push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/goldfish head
        run: make VERSION=head SCHEME=goldfish build
      - name: Push schemers/goldfish head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=goldfish push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/goldfish latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=goldfish build
      - name: Push schemers/goldfish latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=goldfish push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/goldfish head alpine
        run: make LINUX=alpine VERSION=head SCHEME=goldfish build
      - name: Push schemers/goldfish head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=goldfish push
