name: docker-s9fes-push-action

on:
  push:
    paths:
      - implementations/s9fes/**/Dockerfile*
      - .github/workflows/s9fes*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/s9fes latest
        run: make VERSION=latest SCHEME=s9fes build
      - name: Push schemers/s9fes latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=s9fes push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/s9fes head
        run: make VERSION=head SCHEME=s9fes build
      - name: Push schemers/s9fes head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=s9fes push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/s9fes latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=s9fes build
      - name: Push schemers/s9fes latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=s9fes push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/s9fes head alpine
        run: make LINUX=alpine VERSION=head SCHEME=s9fes build
      - name: Push schemers/s9fes head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=s9fes push
