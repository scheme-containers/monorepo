name: docker-ironscheme-push-action

on:
  push:
    paths:
      - implementations/ironscheme/**/Dockerfile*
      - .github/workflows/ironscheme*.yml
  schedule: 
    - cron: "17 4 * * 2"
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/ironscheme latest
        run: make VERSION=latest SCHEME=ironscheme build
      - name: Push schemers/ironscheme latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=ironscheme push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/ironscheme head
        run: make VERSION=head SCHEME=ironscheme build
      - name: Push schemers/ironscheme head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=ironscheme push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/ironscheme latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=ironscheme build
      - name: Push schemers/ironscheme latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=ironscheme push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/ironscheme head alpine
        run: make LINUX=alpine VERSION=head SCHEME=ironscheme build
      - name: Push schemers/ironscheme head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=ironscheme push
