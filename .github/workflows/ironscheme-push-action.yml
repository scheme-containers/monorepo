name: docker-ironscheme-push-action

on:
  push:
    paths:
      - implementations/ironscheme/**/Dockerfile*
      - .github/workflows/ironscheme*.yml
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Build schemers/ironscheme latest
        run: make VERSION=latest SCHEME=ironscheme build
      - name: Build schemers/ironscheme latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=ironscheme build
      - name: Build schemers/ironscheme head
        run: make VERSION=head SCHEME=ironscheme build
      - name: Build schemers/ironscheme head alpine
        run: make LINUX=alpine VERSION=head SCHEME=ironscheme build
  push:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Build schemers/ironscheme latest
        run: make VERSION=latest SCHEME=ironscheme build push
      - name: Build schemers/ironscheme latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=ironscheme build push
      - name: Build schemers/ironscheme head
        run: make VERSION=head SCHEME=ironscheme build push
      - name: Build schemers/ironscheme head alpine
        run: make LINUX=alpine VERSION=head SCHEME=ironscheme build push
