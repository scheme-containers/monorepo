
name: docker-ironscheme-push-action

on:
  push:
    branches:
      - 'master'
    paths:
      - implementations/ironscheme/**/Dockerfile*
      - .github/workflows/ironscheme-push-action.yml
  schedule:
    - cron: "17 4 * * 2"

jobs:
  docker:
    runs-on: ubuntu-22.04
    steps:
      -
        name: Checkout
        uses: actions/checkout@v2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      -
        name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push schemers/ironscheme latest
        run: make VERSION=latest SCHEME=ironscheme build push
      -
        name: Build and push schemers/ironscheme latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=ironscheme build push
      -
        name: Build and push schemers/ironscheme head
        run: make VERSION=head SCHEME=ironscheme build push
      -
        name: Build and push schemers/ironscheme head alpine
        run: make LINUX=alpine VERSION=head SCHEME=ironscheme build push
  docker-arm:
    runs-on: ubuntu-22.04-arm
    steps:
      -
        name: Checkout
        uses: actions/checkout@v2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      -
        name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push schemers/ironscheme latest arm
        run: make ARCH=aarch64 VERSION=latest SCHEME=ironscheme build push
      -
        name: Build and push schemers/ironscheme latest arm alpine
        run: make LINUX=alpine ARCH=aarch64 VERSION=latest SCHEME=ironscheme build push
      -
        name: Build and push schemers/ironscheme head arm
        run: make ARCH=aarch64 VERSION=head SCHEME=ironscheme build push
      -
        name: Build and push schemers/ironscheme head arm alpine
        run: make LINUX=alpine ARCH=aarch64 VERSION=head SCHEME=ironscheme build push
