
name: docker-rscheme-push-action

on:
  push:
    branches:
      - 'master'
    paths:
      - implementations/rscheme/**/Dockerfile

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      -
        name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push schemers/rscheme latest
        run: make VERSION=latest SCHEME=rscheme build push
      -
        name: Build and push schemers/rscheme head
        run: make VERSION=head SCHEME=rscheme build push
