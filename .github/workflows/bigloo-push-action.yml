
name: docker-bigloo-push-action

on:
  push:
    branches:
      - 'master'
    paths:
      - implementations/bigloo/**/Dockerfile*
      - .github/workflows/bigloo*.yml

jobs:
  docker:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push schemers/bigloo latest
        run: make VERSION=latest SCHEME=bigloo build push
      - name: Build and push schemers/bigloo latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=bigloo build push
      - name: Build and push schemers/bigloo head
        run: make VERSION=head SCHEME=bigloo build push
      - name: Build and push schemers/bigloo head alpine
        run: make LINUX=alpine VERSION=head SCHEME=bigloo build push
  docker-arm:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push schemers/bigloo latest
        run: make ARCH=aarch64 VERSION=latest SCHEME=bigloo build push
      - name: Build and push schemers/bigloo latest alpine
        run: make ARCH=aarch64 LINUX=alpine VERSION=latest SCHEME=bigloo build push
      - name: Build and push schemers/bigloo head
        run: make ARCH=aarch64 VERSION=head SCHEME=bigloo build push
      - name: Build and push schemers/bigloo head alpine
        run: make ARCH=aarch64 LINUX=alpine VERSION=head SCHEME=bigloo build push
