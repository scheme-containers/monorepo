name: docker-vicare-push-action

on:
  push:
    paths:
      - implementations/vicare/**/Dockerfile*
      - .github/workflows/vicare*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/vicare latest
        run: make VERSION=latest SCHEME=vicare build
      - name: Push schemers/vicare latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=vicare push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/vicare head
        run: make VERSION=head SCHEME=vicare build
      - name: Push schemers/vicare head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=vicare push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/vicare latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=vicare build
      - name: Push schemers/vicare latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=vicare push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/vicare head alpine
        run: make LINUX=alpine VERSION=head SCHEME=vicare build
      - name: Push schemers/vicare head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=vicare push
