name: docker-scsh-push-action

on:
  push:
    paths:
      - implementations/scsh/**/Dockerfile*
      - .github/workflows/scsh*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/scsh latest
        run: make VERSION=latest SCHEME=scsh build
      - name: Push schemers/scsh latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=scsh push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/scsh head
        run: make VERSION=head SCHEME=scsh build
      - name: Push schemers/scsh head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=scsh push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/scsh latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=scsh build
      - name: Push schemers/scsh latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=scsh push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/scsh head alpine
        run: make LINUX=alpine VERSION=head SCHEME=scsh build
      - name: Push schemers/scsh head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=scsh push
