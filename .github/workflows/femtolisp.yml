name: docker-femtolisp-push-action

on:
  push:
    paths:
      - implementations/femtolisp/**/Dockerfile*
      - .github/workflows/femtolisp*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/femtolisp latest
        run: make VERSION=latest SCHEME=femtolisp build
      - name: Push schemers/femtolisp latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=femtolisp push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/femtolisp head
        run: make VERSION=head SCHEME=femtolisp build
      - name: Push schemers/femtolisp head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=femtolisp push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/femtolisp latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=femtolisp build
      - name: Push schemers/femtolisp latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=femtolisp push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/femtolisp head alpine
        run: make LINUX=alpine VERSION=head SCHEME=femtolisp build
      - name: Push schemers/femtolisp head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=femtolisp push
