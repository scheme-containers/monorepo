name: docker-vanity-push-action

on:
  push:
    paths:
      - implementations/vanity/**/Dockerfile*
      - .github/workflows/vanity*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/vanity latest
        run: make VERSION=latest SCHEME=vanity build
      - name: Push schemers/vanity latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=vanity push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/vanity head
        run: make VERSION=head SCHEME=vanity build
      - name: Push schemers/vanity head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=vanity push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/vanity latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=vanity build
      - name: Push schemers/vanity latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=vanity push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/vanity head alpine
        run: make LINUX=alpine VERSION=head SCHEME=vanity build
      - name: Push schemers/vanity head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=vanity push
