name: docker-schemik-push-action

on:
  push:
    paths:
      - implementations/schemik/**/Dockerfile*
      - .github/workflows/schemik*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/schemik latest
        run: make VERSION=latest SCHEME=schemik build
      - name: Push schemers/schemik latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=schemik push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/schemik head
        run: make VERSION=head SCHEME=schemik build
      - name: Push schemers/schemik head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=schemik push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/schemik latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=schemik build
      - name: Push schemers/schemik latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=schemik push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/schemik head alpine
        run: make LINUX=alpine VERSION=head SCHEME=schemik build
      - name: Push schemers/schemik head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=schemik push
