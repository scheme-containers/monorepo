name: docker-sagittarius-push-action

on:
  push:
    paths:
      - implementations/sagittarius/**/Dockerfile*
      - .github/workflows/sagittarius*.yml
  schedule: 
    - cron: "17 4 * * 2"
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sagittarius latest
        run: make VERSION=latest SCHEME=sagittarius build
      - name: Push schemers/sagittarius latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=sagittarius push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sagittarius head
        run: make VERSION=head SCHEME=sagittarius build
      - name: Push schemers/sagittarius head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=sagittarius push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sagittarius latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=sagittarius build
      - name: Push schemers/sagittarius latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=sagittarius push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sagittarius head alpine
        run: make LINUX=alpine VERSION=head SCHEME=sagittarius build
      - name: Push schemers/sagittarius head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=sagittarius push
