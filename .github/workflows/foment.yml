name: docker-foment-push-action

on:
  push:
    paths:
      - implementations/foment/**/Dockerfile*
      - .github/workflows/foment*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/foment latest
        run: make VERSION=latest SCHEME=foment build
      - name: Push schemers/foment latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=foment push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/foment head
        run: make VERSION=head SCHEME=foment build
      - name: Push schemers/foment head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=foment push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/foment latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=foment build
      - name: Push schemers/foment latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=foment push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/foment head alpine
        run: make LINUX=alpine VERSION=head SCHEME=foment build
      - name: Push schemers/foment head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=foment push
