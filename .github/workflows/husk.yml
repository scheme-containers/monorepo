name: docker-husk-push-action

on:
  push:
    paths:
      - implementations/husk/**/Dockerfile*
      - .github/workflows/husk*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/husk latest
        run: make VERSION=latest SCHEME=husk build
      - name: Push schemers/husk latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=husk push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/husk head
        run: make VERSION=head SCHEME=husk build
      - name: Push schemers/husk head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=husk push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/husk latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=husk build
      - name: Push schemers/husk latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=husk push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/husk head alpine
        run: make LINUX=alpine VERSION=head SCHEME=husk build
      - name: Push schemers/husk head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=husk push
