name: docker-elk-push-action

on:
  push:
    paths:
      - implementations/elk/**/Dockerfile*
      - .github/workflows/elk*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/elk latest
        run: make VERSION=latest SCHEME=elk build
      - name: Push schemers/elk latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=elk push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/elk head
        run: make VERSION=head SCHEME=elk build
      - name: Push schemers/elk head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=elk push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/elk latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=elk build
      - name: Push schemers/elk latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=elk push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/elk head alpine
        run: make LINUX=alpine VERSION=head SCHEME=elk build
      - name: Push schemers/elk head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=elk push
