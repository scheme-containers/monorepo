name: docker-gerbil-push-action

on:
  push:
    paths:
      - implementations/gerbil/**/Dockerfile*
      - .github/workflows/gerbil*.yml
  schedule: 
    - cron: "17 4 * * 2"
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/gerbil latest
        run: make VERSION=latest SCHEME=gerbil build
      - name: Push schemers/gerbil latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=gerbil push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/gerbil head
        run: make VERSION=head SCHEME=gerbil build
      - name: Push schemers/gerbil head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=gerbil push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/gerbil latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=gerbil build
      - name: Push schemers/gerbil latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=gerbil push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/gerbil head alpine
        run: make LINUX=alpine VERSION=head SCHEME=gerbil build
      - name: Push schemers/gerbil head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=gerbil push
