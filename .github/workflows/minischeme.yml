name: docker-minischeme-push-action

on:
  push:
    paths:
      - implementations/minischeme/**/Dockerfile*
      - .github/workflows/minischeme*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/minischeme latest
        run: make VERSION=latest SCHEME=minischeme build
      - name: Push schemers/minischeme latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=minischeme push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/minischeme head
        run: make VERSION=head SCHEME=minischeme build
      - name: Push schemers/minischeme head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=minischeme push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/minischeme latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=minischeme build
      - name: Push schemers/minischeme latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=minischeme push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/minischeme head alpine
        run: make LINUX=alpine VERSION=head SCHEME=minischeme build
      - name: Push schemers/minischeme head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=minischeme push
