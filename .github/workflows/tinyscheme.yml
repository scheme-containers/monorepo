name: tinyscheme

on:
  push:
    paths:
      - implementations/tinyscheme/**/Dockerfile*
      - .github/workflows/tinyscheme*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/tinyscheme latest
        run: make VERSION=latest SCHEME=tinyscheme build
      - name: Push schemers/tinyscheme latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=tinyscheme push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/tinyscheme head
        run: make VERSION=head SCHEME=tinyscheme build
      - name: Push schemers/tinyscheme head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=tinyscheme push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/tinyscheme latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=tinyscheme build
      - name: Push schemers/tinyscheme latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=tinyscheme push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/tinyscheme head alpine
        run: make LINUX=alpine VERSION=head SCHEME=tinyscheme build
      - name: Push schemers/tinyscheme head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=tinyscheme push
