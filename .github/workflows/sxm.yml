name: docker-sxm-push-action

on:
  push:
    paths:
      - implementations/sxm/**/Dockerfile*
      - .github/workflows/sxm*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sxm latest
        run: make VERSION=latest SCHEME=sxm build
      - name: Push schemers/sxm latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=sxm push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sxm head
        run: make VERSION=head SCHEME=sxm build
      - name: Push schemers/sxm head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=sxm push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sxm latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=sxm build
      - name: Push schemers/sxm latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=sxm push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sxm head alpine
        run: make LINUX=alpine VERSION=head SCHEME=sxm build
      - name: Push schemers/sxm head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=sxm push
