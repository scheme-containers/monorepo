name: docker-dfsch-push-action

on:
  push:
    paths:
      - implementations/dfsch/**/Dockerfile*
      - .github/workflows/dfsch*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/dfsch latest
        run: make VERSION=latest SCHEME=dfsch build
      - name: Push schemers/dfsch latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=dfsch push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/dfsch head
        run: make VERSION=head SCHEME=dfsch build
      - name: Push schemers/dfsch head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=dfsch push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/dfsch latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=dfsch build
      - name: Push schemers/dfsch latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=dfsch push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/dfsch head alpine
        run: make LINUX=alpine VERSION=head SCHEME=dfsch build
      - name: Push schemers/dfsch head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=dfsch push
