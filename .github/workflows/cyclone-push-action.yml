name: docker-cyclone-push-action

on:
  push:
    paths:
      - implementations/cyclone/**/Dockerfile*
      - .github/workflows/cyclone*.yml
  schedule: 
    - cron: "17 4 * * 2"
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Build schemers/cyclone latest
        run: make VERSION=latest SCHEME=cyclone build
      - name: Build schemers/cyclone latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=cyclone build
      - name: Build schemers/cyclone head
        run: make VERSION=head SCHEME=cyclone build
      - name: Build schemers/cyclone head alpine
        run: make LINUX=alpine VERSION=head SCHEME=cyclone build
  push:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Build schemers/cyclone latest
        run: make VERSION=latest SCHEME=cyclone build push
      - name: Build schemers/cyclone latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=cyclone build push
      - name: Build schemers/cyclone head
        run: make VERSION=head SCHEME=cyclone build push
      - name: Build schemers/cyclone head alpine
        run: make LINUX=alpine VERSION=head SCHEME=cyclone build push
