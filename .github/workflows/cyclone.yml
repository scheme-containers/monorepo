name: docker-cyclone-push-action

on:
  push:
    paths:
      - implementations/cyclone/**/Dockerfile*
      - .github/workflows/cyclone*.yml
  schedule: 
    - cron: "17 4 * * 2"
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/cyclone latest
        run: make VERSION=latest SCHEME=cyclone build
      - name: Push schemers/cyclone latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=cyclone push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/cyclone head
        run: make VERSION=head SCHEME=cyclone build
      - name: Push schemers/cyclone head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=cyclone push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/cyclone latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=cyclone build
      - name: Push schemers/cyclone latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=cyclone push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/cyclone head alpine
        run: make LINUX=alpine VERSION=head SCHEME=cyclone build
      - name: Push schemers/cyclone head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=cyclone push
