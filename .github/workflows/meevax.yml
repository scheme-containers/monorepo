name: docker-meevax-push-action

on:
  push:
    paths:
      - implementations/meevax/**/Dockerfile*
      - .github/workflows/meevax*.yml
  schedule: 
    - cron: "17 4 * * 2"
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/meevax latest
        run: make VERSION=latest SCHEME=meevax build
      - name: Push schemers/meevax latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=meevax push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/meevax head
        run: make VERSION=head SCHEME=meevax build
      - name: Push schemers/meevax head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=meevax push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/meevax latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=meevax build
      - name: Push schemers/meevax latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=meevax push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/meevax head alpine
        run: make LINUX=alpine VERSION=head SCHEME=meevax build
      - name: Push schemers/meevax head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=meevax push
