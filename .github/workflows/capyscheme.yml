name: docker-capyscheme-push-action

on:
  push:
    paths:
      - implementations/capyscheme/**/Dockerfile*
      - .github/workflows/capyscheme*.yml
  schedule: 
    - cron: "17 4 * * 2"
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/capyscheme latest
        run: make VERSION=latest SCHEME=capyscheme build
      - name: Push schemers/capyscheme latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=capyscheme push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/capyscheme head
        run: make VERSION=head SCHEME=capyscheme build
      - name: Push schemers/capyscheme head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=capyscheme push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/capyscheme latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=capyscheme build
      - name: Push schemers/capyscheme latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=capyscheme push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/capyscheme head alpine
        run: make LINUX=alpine VERSION=head SCHEME=capyscheme build
      - name: Push schemers/capyscheme head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=capyscheme push
