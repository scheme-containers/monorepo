name: docker-stklos-push-action

on:
  push:
    paths:
      - implementations/stklos/**/Dockerfile*
      - .github/workflows/stklos*.yml
  schedule: 
    - cron: "17 4 * * 2"
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/stklos latest
        run: make VERSION=latest SCHEME=stklos build
      - name: Push schemers/stklos latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=stklos push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/stklos head
        run: make VERSION=head SCHEME=stklos build
      - name: Push schemers/stklos head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=stklos push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/stklos latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=stklos build
      - name: Push schemers/stklos latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=stklos push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/stklos head alpine
        run: make LINUX=alpine VERSION=head SCHEME=stklos build
      - name: Push schemers/stklos head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=stklos push
