name: otus

on:
  push:
    paths:
      - implementations/otus/**/Dockerfile*
      - .github/workflows/otus*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/otus latest
        run: make VERSION=latest SCHEME=otus build
      - name: Push schemers/otus latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=otus push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/otus head
        run: make VERSION=head SCHEME=otus build
      - name: Push schemers/otus head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=otus push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/otus latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=otus build
      - name: Push schemers/otus latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=otus push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/otus head alpine
        run: make LINUX=alpine VERSION=head SCHEME=otus build
      - name: Push schemers/otus head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=otus push
