name: docker-sigscheme-push-action

on:
  push:
    paths:
      - implementations/sigscheme/**/Dockerfile*
      - .github/workflows/sigscheme*.yml
jobs:
  Debian-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sigscheme latest
        run: make VERSION=latest SCHEME=sigscheme build
      - name: Push schemers/sigscheme latest
        if: github.ref == 'refs/heads/master'
        run: make VERSION=latest SCHEME=sigscheme push
  Debian-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sigscheme head
        run: make VERSION=head SCHEME=sigscheme build
      - name: Push schemers/sigscheme head
        if: github.ref == 'refs/heads/master'
        run: make VERSION=head SCHEME=sigscheme push
  Alpine-latest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sigscheme latest alpine
        run: make LINUX=alpine VERSION=latest SCHEME=sigscheme build
      - name: Push schemers/sigscheme latest alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=latest SCHEME=sigscheme push
  Alpine-head:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build schemers/sigscheme head alpine
        run: make LINUX=alpine VERSION=head SCHEME=sigscheme build
      - name: Push schemers/sigscheme head alpine
        if: github.ref == 'refs/heads/master'
        run: make LINUX=alpine VERSION=head SCHEME=sigscheme push
